name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Electron + xvfb need a few system libraries on Linux runners.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libgtk-3-0 libgbm1 libasound2t64

      # trustedDependencies (package.json) lets electron's postinstall fetch its binary.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Unit tests (Vitest)
        run: bun run test

      # Produces .vite/build + the packaged app under out/ (cross-OS package smoke).
      - name: Build (package)
        run: bun run package

      - name: E2E (Linux, headless via xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a bun run test:e2e

      - name: E2E (Windows / macOS)
        if: runner.os != 'Linux'
        run: bun run test:e2e
