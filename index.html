<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!--
      Baseline Content-Security-Policy. This (dev-compatible) policy is the
      floor; in the packaged app the main process tightens script-src to 'self'
      via a response header (see src/main/index.ts). default-src 'self' already
      denies all remote origins.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: app-media:; media-src 'self' app-media:; connect-src 'self' ws://localhost:* http://localhost:*; object-src 'none'; base-uri 'self'"
    />
    <title>PraisePresent</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer/index.tsx"></script>
  </body>
</html>
